name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch: # 手動デプロイのみ

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴を完全に取得してエラー防止

      # 2. Node.js 24 をセットアップ（パッケージキャッシュ付き）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. 依存パッケージをキャッシュから復元してクリーンインストール
      - name: Install dependencies
        run: npm ci

      # 4. Viteビルド ＆ HTMLインデックス生成 ＆ Pagefindインデックス構築 ＆ ライセンスコピーを実行
      - name: Build and Index
        run: npm run build

      # 5. パブリックリポジトリの main ブランチへ dist の中身を自動デプロイ
      - name: Deploy to Public Repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PUBLIC_DEPLOY_TOKEN }}
          repository-name: Ken0329ichi/project-oss-gem-finder
          branch: main
          folder: dist
          clean: true
          single-commit: true # 1コミットにまとめて強制上書きデプロイ

