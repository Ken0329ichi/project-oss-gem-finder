query($owner: String!, $name: String!) {
  repository(owner: $owner, name: $name) {
    id
    name
    nameWithOwner
    owner {
      ... on User {
        location
      }
      ... on Organization {
        location
      }
    }
    description
    homepageUrl
    licenseInfo {
      spdxId
    }
    primaryLanguage {
      name
    }
    stargazerCount
    forkCount
    issues(states: OPEN) {
      totalCount
    }
    # 初心者向けタスクのオープン件数を一本釣り
    goodFirstIssues: issues(states: OPEN, labels: ["good first issue", "help wanted"]) {
      totalCount
    }
    # オープンPR数の取得を追加
    openPullRequests: pullRequests(states: OPEN) {
      totalCount
    }
    pushedAt
    defaultBranchRef {
      target {
        ... on Commit {
          committedDate
        }
      }
    }
    repositoryTopics(first: 20) {
      nodes {
        topic {
          name
        }
      }
    }
    # 最新のオープンIssue 50件からラベルを抽出
    latestIssues: issues(first: 50, orderBy: {field: CREATED_AT, direction: DESC}) {
      nodes {
        labels(first: 5) {
          nodes {
            name
          }
        }
      }
    }
    # 👁️ Watching数
    watchers {
      totalCount
    }
    # 📦 総リリース数
    releases(first: 1) {
      totalCount
      nodes {
        tagName
      }
    }
    # 🏷️ 最新リリースバージョン
    latestRelease {
      tagName
    }
    # 👥 貢献者数(目安としての権限保有・メンション可能ユーザー数)
    mentionableUsers {
      totalCount
    }
    # 🌐 言語比率
    languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
      edges {
        size
        node {
          name
        }
      }
    }
  }
}
