services:
  frontend:
    build:
      context: ../../
      dockerfile: docker/frontend/Dockerfile
    volumes:
      - ../../:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true  # WSL2/コンテナ内でのホットリロード(Vite HMR)ファイル検知を安定化
      - NODE_OPTIONS=--max-old-space-size=512  # WSL2メモリ制限環境でのOOMキルを防止するためのNodeメモリ上限制限
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  frontend_node_modules:
